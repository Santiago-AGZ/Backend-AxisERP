name: Deploy to Azure Production

on:
  push:
    branches: [master]
    paths-ignore: ['**.md', 'docs/**', 'Frontend-AxisERP/**']

env:
  ACR_NAME: axiserp
  ACR_SERVER: axiserp.azurecr.io
  RESOURCE_GROUP: axiserp-prod
  CONTAINERAPPS_ENV: axiserp-env

jobs:
  # ─── Build & Push all services in parallel ───
  build-and-push:
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - catalog-service
          - inventory-service
          - sales-service
          - purchase-service
          - report-service
          - api-gateway
        include:
          - service: auth-service
            port: 8081
            dockerfile: auth-service/Dockerfile
          - service: catalog-service
            port: 8082
            dockerfile: catalog-service/Dockerfile
          - service: inventory-service
            port: 8083
            dockerfile: inventory-service/Dockerfile
          - service: sales-service
            port: 8084
            dockerfile: sales-service/Dockerfile
          - service: purchase-service
            port: 8086
            dockerfile: purchase-service/Dockerfile
          - service: report-service
            port: 8085
            dockerfile: report-service/Dockerfile
          - service: api-gateway
            port: 8080
            dockerfile: api-gateway/Dockerfile

    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile & Test
        run: mvn -f ${{ matrix.service }}/pom.xml clean test -q
        timeout-minutes: 5

      - name: Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ${{ matrix.service }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Docker Compile (multi-stage)
        run: |
          docker build \
            -t ${{ env.ACR_SERVER }}/${{ matrix.service }}:${{ github.sha }} \
            -t ${{ env.ACR_SERVER }}/${{ matrix.service }}:latest \
            -f ${{ matrix.dockerfile }} \
            ${{ matrix.service }}

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ env.ACR_SERVER }}/${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Push to ACR
        run: |
          docker push ${{ env.ACR_SERVER }}/${{ matrix.service }} --all-tags

  # ─── Deploy services ───
  deploy-internal:
    needs: build-and-push
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - catalog-service
          - inventory-service
          - sales-service
          - purchase-service
          - report-service

    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy ${{ matrix.service }}
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: .
          acrName: ${{ env.ACR_NAME }}
          containerAppName: ${{ matrix.service }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.ACR_SERVER }}/${{ matrix.service }}:${{ github.sha }}
          targetPort: ${{ (matrix.service=='auth-service' && 8081) || (matrix.service=='catalog-service' && 8082) || (matrix.service=='inventory-service' && 8083) || (matrix.service=='sales-service' && 8084) || (matrix.service=='purchase-service' && 8086) || 8085 }}
          ingress: internal
          environmentVariables: >-
            jpa-ddl-auto=validate
            server-port=${{ matrix.port }}
            APPLICATIONINSIGHTS_CONNECTION_STRING=secretref:appinsights-connstr
          secrets: >-
            jwt-secret keyvaultref://axiserp-kv/JWT-SECRET
            appinsights-connstr keyvaultref://axiserp-kv/APPLICATIONINSIGHTS-CONNECTION-STRING

      - name: Health Check
        run: |
          sleep 15
          FQDN=$(az containerapp show \
            --name ${{ matrix.service }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          curl -sf --max-time 10 "https://$FQDN/actuator/health" || {
            echo "❌ Health check failed for ${{ matrix.service }}"
            exit 1
          }

  # ─── Deploy Gateway (depends on all internal services) ───
  deploy-gateway:
    needs: deploy-internal
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API Gateway
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: .
          acrName: ${{ env.ACR_NAME }}
          containerAppName: api-gateway
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.ACR_SERVER }}/api-gateway:${{ github.sha }}
          targetPort: 8080
          ingress: external
          environmentVariables: >-
            server-port=8080
            auth-service-url=http://auth-service
            catalog-service-url=http://catalog-service
            inventory-service-url=http://inventory-service
            sales-service-url=http://sales-service
            purchase-service-url=http://purchase-service
            report-service-url=http://report-service
            cors-allowed-origins=${{ vars.CORS_ALLOWED_ORIGINS }}

      - name: Smoke Test
        run: |
          sleep 20
          GATEWAY_FQDN=$(az containerapp show \
            --name api-gateway \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "Gateway URL: https://$GATEWAY_FQDN"

          # Health check
          curl -sf --max-time 10 "https://$GATEWAY_FQDN/actuator/health" || {
            echo "❌ Gateway health check failed"
            exit 1
          }

          # E2E: Login (if test credentials exist)
          if [ -n "${{ secrets.TEST_ADMIN_EMAIL }}" ]; then
            echo "Running E2E smoke test..."
            TOKEN=$(curl -sf -X POST "https://$GATEWAY_FQDN/api/v1/auth/login" \
              -H "Content-Type: application/json" \
              -d "{\"email\":\"${{ secrets.TEST_ADMIN_EMAIL }}\",\"password\":\"${{ secrets.TEST_ADMIN_PASSWORD }}\"}" \
              | jq -r '.data.accessToken')
            echo "Login: OK (token received)"

            # Test catalog
            curl -sf "https://$GATEWAY_FQDN/api/v1/productos" \
              -H "Authorization: Bearer $TOKEN" > /dev/null && echo "Catalog: OK"
          fi

  # ─── Update Frontend on Vercel ───
  update-frontend:
    needs: deploy-gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: Santiago-AGZ/frontend-axisERP
          token: ${{ secrets.GH_PAT }}

      - name: Get Gateway URL
        uses: azure/cli@v2
        with:
          inlineScript: |
            GATEWAY_FQDN=$(az containerapp show \
              --name api-gateway \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --query properties.configuration.ingress.fqdn -o tsv)
            echo "VITE_API_URL=https://$GATEWAY_FQDN" > .env.production

      - name: Deploy to Vercel
        run: npx vercel deploy --prod --token ${{ secrets.VERCEL_TOKEN }}
