name: CI - Inventory Service
on:
  push:
    branches: [master]
    paths: [inventory-service/**]
  pull_request:
    branches: [master]
    paths: [inventory-service/**]
  workflow_dispatch:
jobs:
  ci:
    uses: ./.github/workflows/template-ci.yml
    with:
      service: inventory-service
      port: 8083
