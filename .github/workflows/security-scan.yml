name: Security Scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: ['java-kotlin']

    steps:
      - uses: actions/checkout@v5

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: manual

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Compile all services
        run: |
          for dir in auth-service catalog-service inventory-service sales-service purchase-service report-service api-gateway; do
            if [ -f "$dir/pom.xml" ]; then
              mvn -f "$dir/pom.xml" compile -q
            fi
          done

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
