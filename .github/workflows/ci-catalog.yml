name: CI - Catalog Service
on:
  push:
    branches: [master]
    paths: [catalog-service/**]
  pull_request:
    branches: [master]
    paths: [catalog-service/**]
  workflow_dispatch:
jobs:
  ci:
    uses: ./.github/workflows/template-ci.yml
    with:
      service: catalog-service
      port: 8082
