name: CD - Deploy to Azure

on:
  workflow_run:
    workflows:
      - CI - Auth Service
      - CI - Catalog Service
      - CI - API Gateway
      - CI - Inventory Service
      - CI - Sales Service
      - CI - Purchase Service
      - CI - Report Service
    types:
      - completed
    branches: [master]

  workflow_dispatch:

env:
  ACR_SERVER: axiserp.azurecr.io

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth-service
          - catalog-service
          - inventory-service
          - sales-service
          - purchase-service
          - report-service
          - api-gateway
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        run: |
          az login -u "${{ secrets.AZURE_USER }}" -p "${{ secrets.AZURE_PASS }}" --allow-no-subscriptions
          az account set -s "48482985-813d-4a7c-a283-350c1d90799c"

      - name: Login to ACR
        run: az acr login --name axiserp

      - name: Deploy Container App
        run: |
          TAG="${{ github.event.workflow_run.head_sha }}"
          if [ -z "$TAG" ]; then TAG="latest"; fi
          az containerapp update \
            --name ${{ matrix.service }} \
            --resource-group axiserp-prod \
            --image $ACR_SERVER/${{ matrix.service }}:${TAG} \
            --min-replicas 1 --max-replicas 10
