name: Full CI - Build, Docker & Security

on:
  push:
    branches: [main, master]

  pull_request:
    branches: [main, master]

permissions:
  contents: read
  actions: write

concurrency:
  group: ci-full-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-auth:
    uses: ./.github/workflows/ci-template.yml
    with:
      service: auth-service
      build-docker: false
    secrets: inherit

  ci-catalog:
    uses: ./.github/workflows/ci-template.yml
    with:
      service: catalog-service
      build-docker: false
    secrets: inherit

  ci-inventory:
    uses: ./.github/workflows/ci-template.yml
    with:
      service: inventory-service
      build-docker: false
    secrets: inherit

  ci-sales:
    uses: ./.github/workflows/ci-template.yml
    with:
      service: sales-service
      build-docker: false
    secrets: inherit

  ci-purchase:
    uses: ./.github/workflows/ci-template.yml
    with:
      service: purchase-service
      build-docker: false
    secrets: inherit

  ci-report:
    uses: ./.github/workflows/ci-template.yml
    with:
      service: report-service
      build-docker: false
    secrets: inherit

  ci-gateway:
    uses: ./.github/workflows/ci-template.yml
    with:
      service: api-gateway
      build-docker: false
    secrets: inherit

  ci-catalog:
    uses: ./.github/workflows/ci-template.yml
    with:
      service: catalog-service
      build-docker: true
    secrets: inherit

  ci-inventory:
    uses: ./.github/workflows/ci-template.yml
    with:
      service: inventory-service
      build-docker: true
    secrets: inherit

  ci-sales:
    uses: ./.github/workflows/ci-template.yml
    with:
      service: sales-service
      build-docker: true
    secrets: inherit

  ci-purchase:
    uses: ./.github/workflows/ci-template.yml
    with:
      service: purchase-service
      build-docker: true
    secrets: inherit

  ci-report:
    uses: ./.github/workflows/ci-template.yml
    with:
      service: report-service
      build-docker: true
    secrets: inherit

  ci-gateway:
    uses: ./.github/workflows/ci-template.yml
    with:
      service: api-gateway
      build-docker: true
    secrets: inherit
