name: CI Template

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      java-version:
        required: false
        type: string
        default: '21'
      build-docker:
        required: false
        type: boolean
        default: false
      run-trivy:
        required: false
        type: boolean
        default: true

jobs:
  build-test:
    name: ${{ inputs.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin
          cache: maven

      - name: Build and test
        run: mvn -f ${{ inputs.service }}/pom.xml clean verify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ inputs.service }}
          path: ${{ inputs.service }}/target/surefire-reports/
          retention-days: 14

      - name: Upload JAR artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.service }}-jar
          path: ${{ inputs.service }}/target/*.jar
          retention-days: 7
          if-no-files-found: warn

      - name: Run Trivy vulnerability scan (filesystem)
        if: inputs.run-trivy
        uses: aquasecurity/trivy-action@v0.29.0
        with:
          scan-type: fs
          scan-ref: ${{ inputs.service }}
          format: sarif
          output: trivy-fs-${{ inputs.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: 0
          scanners: vuln,secret

      - name: Upload Trivy filesystem results
        if: success() && inputs.run-trivy
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs-${{ inputs.service }}.sarif

      - name: Set up Docker Buildx
        if: inputs.build-docker
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        if: inputs.build-docker
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.service }}
          push: false
          tags: ${{ inputs.service }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Scan Docker image with Trivy
        if: inputs.build-docker && steps.docker_build.conclusion == 'success'
        uses: aquasecurity/trivy-action@v0.29.0
        with:
          scan-type: image
          image-ref: ${{ inputs.service }}:ci-${{ github.sha }}
          format: sarif
          output: trivy-docker-${{ inputs.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: 0
          scanners: vuln

      - name: Upload Docker scan results
        if: success() && inputs.build-docker
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-docker-${{ inputs.service }}.sarif
