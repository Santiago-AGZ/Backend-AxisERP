name: CI Template

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
        description: 'Service directory name (e.g., auth-service)'
      java-version:
        required: false
        type: string
        default: '21'
        description: 'Java version (default: 21)'
      build-docker:
        required: false
        type: boolean
        default: false
        description: 'Build and scan Docker image (default: false)'

jobs:
  build-test:
    name: ${{ inputs.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4.1.7

      - name: Validate service structure
        run: |
          if [ ! -f "${{ inputs.service }}/pom.xml" ]; then
            echo "ERROR: pom.xml not found in ${{ inputs.service }}/"
            exit 1
          fi

          if [ "${{ inputs.build-docker }}" == "true" ] && [ ! -f "${{ inputs.service }}/Dockerfile" ]; then
            echo "ERROR: Dockerfile not found in ${{ inputs.service }}/ but build-docker=true"
            exit 1
          fi

          echo "Service structure validated"

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4.1.0
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin
          cache: maven
          cache-dependency-path: '**/pom.xml'

      - name: Build and test
        run: mvn -f ${{ inputs.service }}/pom.xml clean verify -Dfailsafe.rerunFailingTestsCount=1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4.3.1
        with:
          name: test-results-${{ inputs.service }}
          path: ${{ inputs.service }}/target/surefire-reports/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload JAR artifact
        if: always()
        uses: actions/upload-artifact@v4.3.1
        with:
          name: ${{ inputs.service }}-jar
          path: ${{ inputs.service }}/target/*.jar
          retention-days: 30
          if-no-files-found: warn

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4.3.1
        with:
          name: ${{ inputs.service }}-sbom
          path: ${{ inputs.service }}/target/bom.json
          retention-days: 30
          if-no-files-found: warn

      - name: Set up Docker Buildx
        if: inputs.build-docker
        uses: docker/setup-buildx-action@v3.1.0

      - name: Lint Dockerfile with hadolint
        if: inputs.build-docker
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ inputs.service }}/Dockerfile
          ignore: DL3008,DL3009

      - name: Build Docker image
        if: inputs.build-docker
        id: docker_build
        uses: docker/build-push-action@v7.2.0
        with:
          context: ${{ inputs.service }}
          push: false
          tags: ${{ inputs.service }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          provenance: false
          outputs: type=docker

      - name: Verify Docker image build
        if: inputs.build-docker
        run: |
          docker inspect ${{ inputs.service }}:ci-${{ github.sha }} > /dev/null
          SIZE=$(docker inspect ${{ inputs.service }}:ci-${{ github.sha }} --format='{{.Size}}')
          SIZE_MB=$((SIZE / 1048576))
          echo "Docker image size: ${SIZE_MB}MB"
          if [ $SIZE -gt 536870912 ]; then
            echo "WARNING: Image size ${SIZE_MB}MB exceeds 500MB threshold"
          fi

      - name: Scan Docker image with Trivy
        if: inputs.build-docker
        run: |
          echo "=== Trivy: ${{ inputs.service }} image ==="
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock:ro \
            aquasec/trivy:0.71.0 \
            image \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --format table \
            ${{ inputs.service }}:ci-${{ github.sha }}
