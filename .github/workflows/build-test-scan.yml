name: Build, Test & Security Scan

on:
  push:
    branches: [develop, 'feature/**']
    paths-ignore: ['**.md', 'docs/**', 'Frontend-AxisERP/**']
  pull_request:
    branches: [master]

jobs:
  # ─── Reusable matrix: all 7 services ───
  build-matrix:
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - catalog-service
          - inventory-service
          - sales-service
          - purchase-service
          - report-service
          - api-gateway

    runs-on: ubuntu-latest
    environment: development

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for Sonar

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Compile
        run: mvn -pl ${{ matrix.service }} -am compile -q
        timeout-minutes: 5

      - name: Test
        run: mvn -pl ${{ matrix.service }} test -q
        timeout-minutes: 5

      - name: SonarCloud Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -pl ${{ matrix.service }} sonar:sonar \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=axiserp \
            -Dsonar.projectKey=axiserp-${{ matrix.service }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.qualitygate.wait=false

      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ${{ matrix.service }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          skip-dirs: ${{ matrix.service }}/target
        continue-on-error: true  # Don't block PRs for non-critical

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        continue-on-error: true
        with:
          project: ${{ matrix.service }}
          path: ${{ matrix.service }}
          format: HTML
          args: >
            --failOnCVSS 9
            --suppression suppression.xml
