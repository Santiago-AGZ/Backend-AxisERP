name: CI Template

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      port:
        required: true
        type: number
    secrets:
      ACR_USERNAME:
        required: true
      ACR_PASSWORD:
        required: true

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    name: ${{ inputs.service }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Compile
        run: mvn -f ${{ inputs.service }}/pom.xml compile -q

      - name: Test
        run: mvn -f ${{ inputs.service }}/pom.xml test -q

      - name: Package
        run: mvn -f ${{ inputs.service }}/pom.xml package -DskipTests -q

      - name: Docker Build
        run: |
          docker build \
            -t axiserp.azurecr.io/${{ inputs.service }}:${{ github.run_number }} \
            -t axiserp.azurecr.io/${{ inputs.service }}:latest \
            -f ${{ inputs.service }}/Dockerfile \
            ${{ inputs.service }}

      - name: Push to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login axiserp.azurecr.io -u ${{ secrets.ACR_USERNAME }} --password-stdin
          docker push axiserp.azurecr.io/${{ inputs.service }}:${{ github.run_number }}
          docker push axiserp.azurecr.io/${{ inputs.service }}:latest
