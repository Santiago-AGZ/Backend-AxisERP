name: CI Template

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
    secrets:
      ACR_USERNAME:
        required: true
      ACR_PASSWORD:
        required: true

jobs:
  build:
    name: ${{ inputs.service }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Compile
        run: mvn -f ${{ inputs.service }}/pom.xml compile

      - name: Test
        run: mvn -f ${{ inputs.service }}/pom.xml test

      - name: Publish Test Results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: test-results-${{ inputs.service }}-${{ github.run_id }}
          path: ${{ inputs.service }}/target/surefire-reports/*
          retention-days: 14

      - name: Package
        run: mvn -f ${{ inputs.service }}/pom.xml package -DskipTests

      - name: Docker Build (verification)
        run: |
          docker build --no-cache \
            -t axiserp.azurecr.io/${{ inputs.service }}:${{ github.sha }} \
            -f ${{ inputs.service }}/Dockerfile \
            ${{ inputs.service }}

      - name: Push to ACR
        if: github.ref == 'refs/heads/master'
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login axiserp.azurecr.io -u ${{ secrets.ACR_USERNAME }} --password-stdin
          docker push axiserp.azurecr.io/${{ inputs.service }}:${{ github.sha }}
          docker tag axiserp.azurecr.io/${{ inputs.service }}:${{ github.sha }} axiserp.azurecr.io/${{ inputs.service }}:latest
          docker push axiserp.azurecr.io/${{ inputs.service }}:latest
