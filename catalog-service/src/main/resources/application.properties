spring.application.name=catalog-service

# DATABASE
spring.datasource.url=${CATALOG_DB_URL}
spring.datasource.username=${CATALOG_DB_USERNAME}
spring.datasource.password=${CATALOG_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# SERVER
server.port=8082

# ACTUATOR
management.endpoints.web.exposure.include=health,info

# JWT / SUPABASE AUTH (ES256 via JWKS)
jwt.jwks-uri=${SUPABASE_JWT_ISSUER}/.well-known/jwks.json
jwt.secret=${JWT_SECRET:}

# INTER-SERVICE AUTH
internal.api.key=${INTERNAL_API_KEY}

# SERVICE URLS
catalog.service.url=${CATALOG_SERVICE_URL}

# SALES SERVICE
sales.service.url=${SALES_SERVICE_URL}
