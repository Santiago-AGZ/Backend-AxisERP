spring.application.name=catalog-service# DATABASEspring.datasource.url=${catalog-db-url}spring.datasource.username=${catalog-db-username}spring.datasource.password=${catalog-db-password}spring.datasource.driver-class-name=org.postgresql.Driver# HIKARICP — Neon serverless poolerspring.datasource.hikari.maximum-pool-size=2spring.datasource.hikari.minimum-idle=1spring.datasource.hikari.connection-timeout=10000spring.datasource.hikari.idle-timeout=300000spring.datasource.hikari.max-lifetime=600000spring.datasource.hikari.keepalive-time=30000spring.datasource.hikari.validation-timeout=3000spring.datasource.hikari.connection-test-query=SELECT 1# JPA / HIBERNATEspring.jpa.hibernate.ddl-auto=${jpa-ddl-auto:validate}spring.jpa.show-sql=falsespring.jpa.properties.hibernate.format_sql=falsespring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect# SERVERserver.port=${server-port:8082}# ACTUATORmanagement.endpoints.web.exposure.include=health,info# JWT / SUPABASE AUTH (ES256 via JWKS)jwt.jwks-uri=${supabase-jwt-issuer}/.well-known/jwks.jsonjwt.secret=${jwt-secret:}# INTER-SERVICE AUTHinternal.api.key=${internal-api-key}# SERVICE URLScatalog.service.url=${catalog-service-url}# SALES SERVICEsales.service.url=${sales-service-url}