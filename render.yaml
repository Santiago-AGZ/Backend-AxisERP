# ============================================
# AxisERP - Azure Container Apps Configuration
# ============================================
# This file documents the expected env-vars/secrets per service.
# Actual deployment is done via GitHub Actions (deploy-prod.yml)
# using az containerapp update / azure/container-apps-deploy-action.
# ============================================

services:
  - name: auth-service
    port: 8081
    envVars:
      - key: auth-db-url
        secretRef: auth-db-url
      - key: auth-db-username
        secretRef: auth-db-username
      - key: auth-db-password
        secretRef: auth-db-password
      - key: supabase-url
        secretRef: supabase-url
      - key: supabase-jwt-issuer
        secretRef: supabase-jwt-issuer
      - key: supabase-service-role-key
        secretRef: supabase-service-role-key
      - key: supabase-anon-key
        secretRef: supabase-anon-key
      - key: jwt-secret
        secretRef: jwt-secret
      - key: jwt-access-expiration
        value: "900000"
      - key: jwt-refresh-expiration
        value: "604800000"
      - key: internal-api-key
        secretRef: internal-api-key
      - key: jpa-ddl-auto
        value: "validate"
      - key: server-port
        value: "8081"

  - name: catalog-service
    port: 8082
    envVars:
      - key: catalog-db-url
        secretRef: catalog-db-url
      - key: catalog-db-username
        secretRef: catalog-db-username
      - key: catalog-db-password
        secretRef: catalog-db-password
      - key: supabase-jwt-issuer
        secretRef: supabase-jwt-issuer
      - key: internal-api-key
        secretRef: internal-api-key
      - key: jpa-ddl-auto
        value: "validate"
      - key: server-port
        value: "8082"
      - key: catalog-service-url
        value: "http://catalog-service:8082"
      - key: sales-service-url
        value: "http://sales-service:8084"

  - name: inventory-service
    port: 8083
    envVars:
      - key: inventory-db-url
        secretRef: inventory-db-url
      - key: inventory-db-username
        secretRef: inventory-db-username
      - key: inventory-db-password
        secretRef: inventory-db-password
      - key: supabase-jwt-issuer
        secretRef: supabase-jwt-issuer
      - key: internal-api-key
        secretRef: internal-api-key
      - key: jpa-ddl-auto
        value: "validate"
      - key: server-port
        value: "8083"
      - key: catalog-service-url
        value: "http://catalog-service:8082"

  - name: sales-service
    port: 8084
    envVars:
      - key: sales-db-url
        secretRef: sales-db-url
      - key: sales-db-username
        secretRef: sales-db-username
      - key: sales-db-password
        secretRef: sales-db-password
      - key: supabase-jwt-issuer
        secretRef: supabase-jwt-issuer
      - key: internal-api-key
        secretRef: internal-api-key
      - key: jpa-ddl-auto
        value: "validate"
      - key: server-port
        value: "8084"
      - key: catalog-service-url
        value: "http://catalog-service:8082"
      - key: inventory-service-url
        value: "http://inventory-service:8083"

  - name: purchase-service
    port: 8086
    envVars:
      - key: purchase-db-url
        secretRef: purchase-db-url
      - key: purchase-db-username
        secretRef: purchase-db-username
      - key: purchase-db-password
        secretRef: purchase-db-password
      - key: supabase-jwt-issuer
        secretRef: supabase-jwt-issuer
      - key: internal-api-key
        secretRef: internal-api-key
      - key: jpa-ddl-auto
        value: "validate"
      - key: server-port
        value: "8086"
      - key: catalog-service-url
        value: "http://catalog-service:8082"
      - key: inventory-service-url
        value: "http://inventory-service:8083"

  - name: report-service
    port: 8085
    envVars:
      - key: report-db-url
        secretRef: report-db-url
      - key: report-db-username
        secretRef: report-db-username
      - key: report-db-password
        secretRef: report-db-password
      - key: supabase-jwt-issuer
        secretRef: supabase-jwt-issuer
      - key: internal-api-key
        secretRef: internal-api-key
      - key: jpa-ddl-auto
        value: "update"
      - key: server-port
        value: "8085"
      - key: catalog-service-url
        value: "http://catalog-service:8082"
      - key: inventory-service-url
        value: "http://inventory-service:8083"
      - key: sales-service-url
        value: "http://sales-service:8084"
      - key: purchase-service-url
        value: "http://purchase-service:8086"

  - name: api-gateway
    port: 8080
    envVars:
      - key: server-port
        value: "8080"
      - key: auth-service-url
        value: "http://auth-service:8081"
      - key: catalog-service-url
        value: "http://catalog-service:8082"
      - key: inventory-service-url
        value: "http://inventory-service:8083"
      - key: sales-service-url
        value: "http://sales-service:8084"
      - key: purchase-service-url
        value: "http://purchase-service:8086"
      - key: report-service-url
        value: "http://report-service:8085"
