spring.application.name=auth-service

# DATABASE
spring.datasource.url=${auth-db-url}
spring.datasource.username=${auth-db-username}
spring.datasource.password=${auth-db-password}
spring.datasource.driver-class-name=org.postgresql.Driver

# HIKARICP — Neon serverless pooler
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=240000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=${jpa-ddl-auto:validate}
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# SERVER
server.port=${server-port:8081}

# JWT INTERNO (HS256 - login/refresh tokens)
jwt.secret=${jwt-secret}
jwt.access-token-expiration=${jwt-access-expiration:900000}
jwt.refresh-token-expiration=${jwt-refresh-expiration:604800000}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${supabase-jwt-issuer}/.well-known/jwks.json

# ACTUATOR
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.health.mail.enabled=false

# SUPABASE ADMIN API
supabase.url=${supabase-url}
supabase.service-role-key=${supabase-service-role-key}
supabase.anon-key=${supabase-anon-key}

# MAIL (ResendEmailSenderAdapter)
spring.mail.host=${mail-host:smtp.resend.com}
spring.mail.port=587
spring.mail.username=${mail-username:resend}
spring.mail.password=${mail-password:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# INTER-SERVICE AUTH
internal.api.key=${internal-api-key}

# FRONTEND
app-frontend-url=${FRONTEND_URL:http://localhost:5173}

# OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.show-actuator=true
springdoc.packages-to-scan=com.axiserp

