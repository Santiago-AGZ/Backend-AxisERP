spring.application.name=auth-service

# DATABASE
spring.datasource.url=${AUTH_DB_URL}
spring.datasource.username=${AUTH_DB_USERNAME}
spring.datasource.password=${AUTH_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HIKARICP — Neon serverless pooler
spring.datasource.hikari.max-lifetime=240000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.connection-timeout=10000

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# SERVER
server.port=8081

# JWT INTERNO (HS256 - login/refresh tokens)
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION:900000}
jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:604800000}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SUPABASE_JWT_ISSUER}/.well-known/jwks.json

# ACTUATOR
management.endpoints.web.exposure.include=health,info

# SUPABASE ADMIN API
supabase.url=${SUPABASE_URL}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}
supabase.anon-key=${SUPABASE_ANON_KEY}

# MAIL (ResendEmailSenderAdapter)
spring.mail.host=${MAIL_HOST:smtp.resend.com}
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:resend}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# INTER-SERVICE AUTH
internal.api.key=${INTERNAL_API_KEY}
