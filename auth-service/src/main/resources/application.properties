spring.application.name=auth-service

# =========================================
# DATABASE
# =========================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/axiserp_auth}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================================
# JPA / HIBERNATE
# =========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# =========================================
# SERVER
# =========================================
server.port=8081

# =========================================
# SUPABASE AUTH (JWT validation via JWKS)
# =========================================
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SUPABASE_JWT_ISSUER:https://hbtcusxbkkefphunarwn.supabase.co/auth/v1}/.well-known/jwks.json

# =========================================
# ACTUATOR
# =========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always


# =========================================
# SUPABASE ADMIN API (user creation/invite)
# =========================================
supabase.url=${SUPABASE_URL}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}
supabase.anon-key=${SUPABASE_ANON_KEY}
