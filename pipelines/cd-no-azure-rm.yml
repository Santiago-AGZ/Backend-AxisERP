# AxisERP - CD Pipeline (sin AzureRM, usa az login con credenciales secretas)
# Despliega a Dev (auto) -> Staging (approval) -> Production (approval)

trigger:
  branches: [master]
  paths:
    include:
      - auth-service/**
      - catalog-service/**
      - inventory-service/**
      - sales-service/**
      - purchase-service/**
      - report-service/**
      - api-gateway/**

variables:
  - name: acrServer
    value: axiserp.azurecr.io

stages:
  - stage: DeployDev
    displayName: 'DEV'
    jobs:
      - job: Deploy
        displayName: 'Deploy all services'
        pool: ubuntu-latest
        steps:
          - task: AzureCLI@2
            displayName: 'Login Azure'
            inputs:
              azureSubscription: 'axiserp-azure'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "Logged in"
                az account show -o table

          - template: cd-deploy.yml
            parameters:
              environment: dev
              resourceGroup: axiserp-prod

  - stage: DeployStaging
    displayName: 'STAGING'
    dependsOn: DeployDev
    jobs:
      - deployment: Staging
        environment: 'axiserp-staging'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: cd-deploy.yml
                  parameters:
                    environment: staging
                    resourceGroup: axiserp-prod

  - stage: DeployProduction
    displayName: 'PRODUCTION'
    dependsOn: DeployStaging
    jobs:
      - deployment: Production
        environment: 'axiserp-production'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: cd-deploy.yml
                  parameters:
                    environment: production
                    resourceGroup: axiserp-prod

  - stage: SmokeTests
    displayName: 'SMOKE TESTS'
    dependsOn: DeployProduction
    jobs:
      - job: Verify
        displayName: 'E2E verification'
        pool: ubuntu-latest
        steps:
          - task: AzureCLI@2
            displayName: 'Smoke tests'
            inputs:
              azureSubscription: 'axiserp-azure'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -e
                FQDN=$(az containerapp show --name api-gateway -g axiserp-prod \
                  --query properties.configuration.ingress.fqdn -o tsv)
                echo "Gateway: https://$FQDN"

                curl -sf --max-time 30 "https://$FQDN/actuator/health"
                echo "[PASS] Health"

                RESP=$(curl -s --max-time 60 -X POST "https://$FQDN/api/v1/auth/login" \
                  -H "Content-Type: application/json" \
                  -d "{\"email\":\"$(TEST_ADMIN_EMAIL)\",\"password\":\"$(TEST_ADMIN_PASSWORD)\"}")
                TOKEN=$(echo $RESP | jq -r '.data.accessToken')
                echo "[PASS] Login"

                curl -sf --max-time 30 "https://$FQDN/api/v1/productos?page=1&size=1" \
                  -H "Authorization: Bearer $TOKEN"
                echo "[PASS] Catalog"

                echo "ALL TESTS PASSED"
            env:
              TEST_ADMIN_EMAIL: $(TEST_ADMIN_EMAIL)
              TEST_ADMIN_PASSWORD: $(TEST_ADMIN_PASSWORD)
