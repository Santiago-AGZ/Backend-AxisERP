# ============================================
# AxisERP - CI Template (Reusable per service)
# ============================================
parameters:
  - name: service
    type: string
  - name: port
    type: number
    default: 8080
  - name: contextPath
    type: string
    default: ''

jobs:
  - job: Build_${{ replace(parameters.service, '-', '_') }}
    displayName: 'CI: ${{ parameters.service }}'
    pool:
      vmImage: ubuntu-latest
    variables:
      acrServer: axiserp.azurecr.io
      acrName: axiserp
      imageTag: ${{ parameters.service }}:$(Build.BuildNumber)

    steps:
      - task: JavaToolInstaller@0
        displayName: 'Install Java 21'
        inputs:
          versionSpec: '21'
          jdkArchitectureOption: x64
          jdkSourceOption: PreInstalled

      - task: Maven@4
        displayName: 'Maven: compile + test'
        inputs:
          mavenPomFile: '${{ parameters.contextPath }}${{ parameters.service }}/pom.xml'
          goals: 'clean verify'
          options: '-DskipTests=false -Dfailsafe.rerunFailingTestsCount=1'
          publishJUnitResults: true
          testResultsFiles: '**/surefire-reports/TEST-*.xml'
          codeCoverageToolOption: JaCoCo
          codeCoverageClassFilesDirectories: '${{ parameters.contextPath }}${{ parameters.service }}/target/classes'
          codeCoverageSourceDirectories: '${{ parameters.contextPath }}${{ parameters.service }}/src/main/java'

      - task: Docker@2
        displayName: 'Docker: build'
        inputs:
          containerRegistry: 'axiserp-acr'
          repository: ${{ parameters.service }}
          command: build
          Dockerfile: '${{ parameters.contextPath }}${{ parameters.service }}/Dockerfile'
          buildContext: '${{ parameters.contextPath }}${{ parameters.service }}'
          tags: |
            $(Build.BuildNumber)
            latest

      - task: Docker@2
        displayName: 'Docker: push to ACR'
        inputs:
          containerRegistry: 'axiserp-acr'
          repository: ${{ parameters.service }}
          command: push
          tags: |
            $(Build.BuildNumber)
            latest

      - task: PublishPipelineArtifact@1
        displayName: 'Publish manifest'
        inputs:
          targetPath: '${{ parameters.contextPath }}${{ parameters.service }}/target'
          artifact: '${{ parameters.service }}-target'
        condition: succeededOrFailed()
