# ============================================
# AxisERP - CD Pipeline (Deploy to Azure)
# ============================================
# Trigger: manual or after CI completion
# Deploys all 7 microservices to Azure Container Apps
# ============================================

trigger: none

resources:
  pipelines:
    - pipeline: CI
      source: AxisERP-CI
      trigger:
        branches:
          - main
          - master

variables:
  - name: acrServer
    value: axiserp.azurecr.io
  - name: resourceGroup
    value: axiserp-prod
  - name: containerEnv
    value: AxisERP-Env
  - name: imageTag
    value: $(Build.BuildNumber)

stages:
  # -------------------------------------------------------------------
  # STAGE 1: Deploy Internal Services (auth first, then rest)
  # -------------------------------------------------------------------
  - stage: DeployAuth
    displayName: 'Deploy Auth Service'
    dependsOn: []
    jobs:
      - template: cd-template.yml
        parameters:
          service: auth-service
          port: 8081
          ingress: external
          envVars: |
            auth-db-url=jdbc:postgresql://ep-wispy-voice-aqodv5c1-pooler.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require
            auth-db-username=secretref:auth-db-username
            auth-db-password=secretref:auth-db-password
            supabase-url=https://hbtcusxbkkefphunarwn.supabase.co
            supabase-jwt-issuer=https://hbtcusxbkkefphunarwn.supabase.co/auth/v1
            supabase-service-role-key=secretref:supabase-service-role-key
            supabase-anon-key=secretref:supabase-anon-key
            jpa-ddl-auto=validate
            jwt-secret=secretref:jwt-secret
            jwt-access-expiration=900000
            jwt-refresh-expiration=604800000
            internal-api-key=secretref:internal-api-key
            server-port=8081

  # -------------------------------------------------------------------
  # STAGE 2: Deploy Remaining Internal Services (parallel)
  # -------------------------------------------------------------------
  - stage: DeployInternal
    displayName: 'Deploy Internal Services'
    dependsOn: DeployAuth
    jobs:
      - template: cd-template.yml
        parameters:
          service: catalog-service
          port: 8082
          ingress: internal
          envVars: |
            catalog-db-url=jdbc:postgresql://ep-rapid-night-aq5mpoqi-pooler.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require
            catalog-db-username=secretref:catalog-db-username
            catalog-db-password=secretref:catalog-db-password
            supabase-jwt-issuer=https://hbtcusxbkkefphunarwn.supabase.co/auth/v1
            internal-api-key=secretref:internal-api-key
            jpa-ddl-auto=validate
            server-port=8082
            catalog-service-url=http://catalog-service
            sales-service-url=http://sales-service

      - template: cd-template.yml
        parameters:
          service: inventory-service
          port: 8083
          ingress: internal
          envVars: |
            inventory-db-url=jdbc:postgresql://ep-still-resonance-apfxlmlm-pooler.c-7.us-east-1.aws.neon.tech/neondb?sslmode=require
            inventory-db-username=secretref:inventory-db-username
            inventory-db-password=secretref:inventory-db-password
            supabase-jwt-issuer=https://hbtcusxbkkefphunarwn.supabase.co/auth/v1
            internal-api-key=secretref:internal-api-key
            jpa-ddl-auto=validate
            server-port=8083
            catalog-service-url=http://catalog-service

      - template: cd-template.yml
        parameters:
          service: sales-service
          port: 8084
          ingress: internal
          envVars: |
            sales-db-url=jdbc:postgresql://ep-misty-waterfall-apbais5g-pooler.c-7.us-east-1.aws.neon.tech/neondb?sslmode=require
            sales-db-username=secretref:sales-db-username
            sales-db-password=secretref:sales-db-password
            supabase-jwt-issuer=https://hbtcusxbkkefphunarwn.supabase.co/auth/v1
            internal-api-key=secretref:internal-api-key
            jpa-ddl-auto=validate
            server-port=8084
            catalog-service-url=http://catalog-service
            inventory-service-url=http://inventory-service

      - template: cd-template.yml
        parameters:
          service: purchase-service
          port: 8086
          ingress: internal
          envVars: |
            purchase-db-url=jdbc:postgresql://ep-quiet-union-aqsh56i9-pooler.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require
            purchase-db-username=secretref:purchase-db-username
            purchase-db-password=secretref:purchase-db-password
            supabase-jwt-issuer=https://hbtcusxbkkefphunarwn.supabase.co/auth/v1
            internal-api-key=secretref:internal-api-key
            jpa-ddl-auto=validate
            server-port=8086
            catalog-service-url=http://catalog-service
            inventory-service-url=http://inventory-service

      - template: cd-template.yml
        parameters:
          service: report-service
          port: 8085
          ingress: internal
          envVars: |
            report-db-url=jdbc:postgresql://ep-flat-dream-aphtqln9-pooler.c-7.us-east-1.aws.neon.tech/neondb?sslmode=require
            report-db-username=secretref:report-db-username
            report-db-password=secretref:report-db-password
            supabase-jwt-issuer=https://hbtcusxbkkefphunarwn.supabase.co/auth/v1
            internal-api-key=secretref:internal-api-key
            jpa-ddl-auto=update
            server-port=8085
            catalog-service-url=http://catalog-service
            inventory-service-url=http://inventory-service
            sales-service-url=http://sales-service
            purchase-service-url=http://purchase-service

  # -------------------------------------------------------------------
  # STAGE 3: Deploy API Gateway (depends on all internal)
  # -------------------------------------------------------------------
  - stage: DeployGateway
    displayName: 'Deploy API Gateway'
    dependsOn: DeployInternal
    jobs:
      - template: cd-template.yml
        parameters:
          service: api-gateway
          port: 8080
          ingress: external
          envVars: |
            server-port=8080
            auth-service-url=http://auth-service
            catalog-service-url=http://catalog-service
            inventory-service-url=http://inventory-service
            sales-service-url=http://sales-service
            purchase-service-url=http://purchase-service
            report-service-url=http://report-service

  # -------------------------------------------------------------------
  # STAGE 4: Smoke Tests
  # -------------------------------------------------------------------
  - stage: SmokeTests
    displayName: 'Smoke Tests'
    dependsOn: DeployGateway
    jobs:
      - job: HealthCheck
        displayName: 'Health checks'
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: AzureCLI@2
            displayName: 'Get Gateway FQDN'
            inputs:
              azureSubscription: 'axiserp-azure'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                GATEWAY_FQDN=$(az containerapp show \
                  --name api-gateway \
                  --resource-group $(resourceGroup) \
                  --query properties.configuration.ingress.fqdn -o tsv)
                echo "##vso[task.setvariable variable=gatewayFqdn]$GATEWAY_FQDN"
                echo "Gateway: https://$GATEWAY_FQDN"

          - bash: |
              echo "=== Gateway Health ==="
              curl -sf --max-time 30 "https://$(gatewayFqdn)/actuator/health" || exit 1
              echo ""

              echo "=== Auth Health ==="
              AUTH_FQDN=$(az containerapp show --name auth-service --resource-group $(resourceGroup) --query properties.configuration.ingress.fqdn -o tsv)
              curl -sf --max-time 30 "https://$AUTH_FQDN/actuator/health" || exit 1
              echo ""

              echo "=== Login Test ==="
              RESPONSE=$(curl -s --max-time 60 -X POST "https://$(gatewayFqdn)/api/v1/auth/login" \
                -H "Content-Type: application/json" \
                -d '{"email":"$(TEST_ADMIN_EMAIL)","password":"$(TEST_ADMIN_PASSWORD)"}')
              SUCCESS=$(echo $RESPONSE | jq -r '.success')
              if [ "$SUCCESS" != "true" ]; then
                echo "Login failed: $RESPONSE"
                exit 1
              fi
              TOKEN=$(echo $RESPONSE | jq -r '.data.accessToken')
              echo "Login: OK"

              echo "=== Catalog Test ==="
              CAT=$(curl -s --max-time 60 "https://$(gatewayFqdn)/api/v1/productos?page=1&size=1" \
                -H "Authorization: Bearer $TOKEN")
              CAT_SUCCESS=$(echo $CAT | jq -r '.success')
              if [ "$CAT_SUCCESS" != "true" ]; then
                echo "Catalog failed: $CAT"
                exit 1
              fi
              echo "Catalog: OK"
            displayName: 'End-to-end smoke tests'
            env:
              TEST_ADMIN_EMAIL: $(TEST_ADMIN_EMAIL)
              TEST_ADMIN_PASSWORD: $(TEST_ADMIN_PASSWORD)
