# AxisERP - CI Template (reusable)
# Usado por los 7 pipelines CI de cada microservicio

parameters:
  - name: service
    type: string
  - name: port
    type: number

jobs:
  - job: Build_${{ replace(parameters.service, '-', '_') }}
    displayName: 'CI: ${{ parameters.service }}'
    pool:
      vmImage: ubuntu-latest

    steps:
      - checkout: self
        fetchDepth: 1

      - task: JavaToolInstaller@0
        displayName: 'JDK 21'
        inputs:
          versionSpec: '21'
          jdkArchitectureOption: x64
          jdkSourceOption: PreInstalled

      - task: Maven@4
        displayName: 'Compile + Test'
        inputs:
          mavenPomFile: '${{ parameters.service }}/pom.xml'
          goals: 'clean verify'
          options: '-q'
          publishJUnitResults: true
          testResultsFiles: '**/surefire-reports/TEST-*.xml'
          codeCoverageToolOption: JaCoCo

      - task: Docker@2
        displayName: 'Login ACR'
        inputs:
          containerRegistry: 'axiserp-acr'
          command: login

      - task: Docker@2
        displayName: 'Build image'
        inputs:
          containerRegistry: 'axiserp-acr'
          repository: ${{ parameters.service }}
          command: build
          Dockerfile: '${{ parameters.service }}/Dockerfile'
          buildContext: '${{ parameters.service }}'
          tags: |
            $(Build.BuildNumber)
            latest

      - task: Docker@2
        displayName: 'Push to ACR'
        inputs:
          containerRegistry: 'axiserp-acr'
          repository: ${{ parameters.service }}
          command: push
          tags: |
            $(Build.BuildNumber)
            latest

      - bash: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock:ro \
            aquasec/trivy:latest image \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            --timeout 10m \
            $(acrServer)/${{ parameters.service }}:$(Build.BuildNumber)
        displayName: 'Trivy scan'
        continueOnError: true
        env:
          acrServer: axiserp.azurecr.io
