# AxisERP - CI Template (reusable - sin dependencias de tasks)
# Usado por los 7 pipelines CI de cada microservicio

parameters:
  - name: service
    type: string
  - name: port
    type: number

jobs:
  - job: Build_${{ replace(parameters.service, '-', '_') }}
    displayName: 'CI: ${{ parameters.service }}'
    pool: Azure Pipelines

    steps:
      - checkout: self
        fetchDepth: 1

      - bash: |
          echo "=== Building ${{ parameters.service }} ==="
          echo "Java version:"
          java -version
          echo "Maven version:"
          mvn -version
        displayName: 'Check environment'

      - bash: |
          cd ${{ parameters.service }}
          mvn clean compile -q
        displayName: 'Maven compile'

      - bash: |
          cd ${{ parameters.service }}
          mvn test -q
        displayName: 'Maven test'

      - bash: |
          cd ${{ parameters.service }}
          mvn package -DskipTests -q
        displayName: 'Maven package'

      - bash: |
          docker build \
            -t axiserp.azurecr.io/${{ parameters.service }}:$(Build.BuildNumber) \
            -t axiserp.azurecr.io/${{ parameters.service }}:latest \
            -f ${{ parameters.service }}/Dockerfile \
            ${{ parameters.service }}
        displayName: 'Docker build'

      - bash: |
          echo "$(DOCKER_PASSWORD)" | docker login axiserp.azurecr.io -u "$(DOCKER_USERNAME)" --password-stdin
          docker push axiserp.azurecr.io/${{ parameters.service }}:$(Build.BuildNumber)
          docker push axiserp.azurecr.io/${{ parameters.service }}:latest
        displayName: 'Docker push to ACR'
        env:
          DOCKER_USERNAME: $(DOCKER_USERNAME)
          DOCKER_PASSWORD: $(DOCKER_PASSWORD)
