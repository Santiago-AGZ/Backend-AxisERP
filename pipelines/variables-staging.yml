# ============================================
# AxisERP - Variables: Staging
# ============================================
# Import into Azure DevOps Library as Variable Group "axiserp-staging"
# ============================================

variables:
  - name: environment
    value: staging
  - name: resourceGroup
    value: axiserp-staging
  - name: containerEnv
    value: AxisERP-Env-Staging
  - name: acrServer
    value: axiserp.azurecr.io
  - name: acrName
    value: axiserp
  - name: minReplicas
    value: 1
  - name: maxReplicas
    value: 5
  - name: cpu
    value: "0.5"
  - name: memory
    value: "1Gi"
  - name: jpaDdlAuto
    value: validate
  - name: corsAllowedOrigins
    value: "https://*.vercel.app,https://staging.axiserp.com"
