# ============================================
# AxisERP - Variables: Production
# ============================================
# Import into Azure DevOps Library as Variable Group "axiserp-prod"
# ============================================

variables:
  - name: environment
    value: production
  - name: resourceGroup
    value: axiserp-prod
  - name: containerEnv
    value: AxisERP-Env
  - name: acrServer
    value: axiserp.azurecr.io
  - name: acrName
    value: axiserp
  - name: minReplicas
    value: 1
  - name: maxReplicas
    value: 10
  - name: cpu
    value: "0.5"
  - name: memory
    value: "1Gi"
  - name: jpaDdlAuto
    value: validate
  - name: corsAllowedOrigins
    value: "https://frontend-axis-erp.vercel.app,https://axiserp.com"
