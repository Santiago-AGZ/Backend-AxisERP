spring.application.name=report-service

# =========================================
# DATABASE
# =========================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/axiserp_report}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================================
# JPA / HIBERNATE
# =========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# =========================================
# SERVER
# =========================================
server.port=8085

# =========================================
# ACTUATOR
# =========================================
management.endpoints.web.exposure.include=health,info

# =========================================
# SUPABASE AUTH (JWT validation via JWKS)
# =========================================
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SUPABASE_JWT_ISSUER:https://hbtcusxbkkefphunarwn.supabase.co/auth/v1}/.well-known/jwks.json
spring.security.oauth2.resourceserver.jwt.issuer-uri=${SUPABASE_JWT_ISSUER:https://hbtcusxbkkefphunarwn.supabase.co/auth/v1}

# =========================================
# MICROSERVICES
# =========================================
inventory.service.url=${INVENTORY_SERVICE_URL:http://inventory-service:8087}
catalog.service.url=${CATALOG_SERVICE_URL:http://catalog-service:8082}
sales.service.url=${SALES_SERVICE_URL:http://sales-service:8084}
purchase.service.url=${PURCHASE_SERVICE_URL:http://purchase-service:8086}
auth.service.url=${AUTH_SERVICE_URL:http://auth-service:8081}
