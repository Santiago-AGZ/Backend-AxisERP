spring.application.name=report-service

# DATABASE
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# SERVER
server.port=8085

# ACTUATOR
management.endpoints.web.exposure.include=health,info

# JWT — ES256 via Supabase JWKS
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SUPABASE_JWT_ISSUER}/.well-known/jwks.json

# EXTERNAL SERVICES
inventory.service.url=${INVENTORY_SERVICE_URL}
catalog.service.url=${CATALOG_SERVICE_URL}
sales.service.url=${SALES_SERVICE_URL}
purchase.service.url=${PURCHASE_SERVICE_URL}
auth.service.url=${AUTH_SERVICE_URL}

# INTER-SERVICE
internal.api.key=${INTERNAL_API_KEY}
