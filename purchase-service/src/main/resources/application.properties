spring.application.name=purchase-service

# DATABASE
spring.datasource.url=${PURCHASE_DB_URL}
spring.datasource.username=${PURCHASE_DB_USERNAME}
spring.datasource.password=${PURCHASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HIKARICP — Neon serverless pooler
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# SERVER
server.port=8086

# ACTUATOR
management.endpoints.web.exposure.include=health,info

# JWT / SUPABASE AUTH (ES256 via JWKS)
jwt.jwks-uri=${SUPABASE_JWT_ISSUER}/.well-known/jwks.json

# INTER-SERVICE AUTH
internal.api.key=${INTERNAL_API_KEY}

# SERVICE URLS
inventory.service.url=${INVENTORY_SERVICE_URL}
catalog.service.url=${CATALOG_SERVICE_URL}

# CIRCUIT BREAKER
resilience4j.circuitbreaker.instances.catalogService.sliding-window-size=10
resilience4j.circuitbreaker.instances.catalogService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.catalogService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.catalogService.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.catalogService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.inventoryService.sliding-window-size=10
resilience4j.circuitbreaker.instances.inventoryService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.inventoryService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.inventoryService.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.inventoryService.permitted-number-of-calls-in-half-open-state=3

# RETRY (applies before CircuitBreaker)
resilience4j.retry.instances.catalogService.max-attempts=3
resilience4j.retry.instances.catalogService.wait-duration=500ms
resilience4j.retry.instances.catalogService.enable-exponential-backoff=true
resilience4j.retry.instances.catalogService.exponential-backoff-multiplier=2.0
resilience4j.retry.instances.inventoryService.max-attempts=3
resilience4j.retry.instances.inventoryService.wait-duration=500ms
resilience4j.retry.instances.inventoryService.enable-exponential-backoff=true
resilience4j.retry.instances.inventoryService.exponential-backoff-multiplier=2.0
