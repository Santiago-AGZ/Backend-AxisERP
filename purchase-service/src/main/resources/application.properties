spring.application.name=purchase-service
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/axiserp_purchase}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
server.port=8086
management.endpoints.web.exposure.include=health,info
# JWT / SUPABASE AUTH (ES256 via JWKS)
jwt.jwks-uri=${SUPABASE_JWT_ISSUER:https://hbtcusxbkkefphunarwn.supabase.co/auth/v1}/.well-known/jwks.json
inventory.service.url=${INVENTORY_SERVICE_URL:http://localhost:8087}
catalog.service.url=${CATALOG_SERVICE_URL:http://catalog-service:8082}
internal.api.key=${INTERNAL_API_KEY:}
