services:

  auth-service:
    build: ./auth-service
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: ${AUTH_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${AUTH_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${AUTH_DB_PASSWORD}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_JWT_ISSUER: ${SUPABASE_JWT_ISSUER}
    networks:
      - axiserp-network

  catalog-service:
    build: ./catalog-service
    container_name: catalog-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: ${CATALOG_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${CATALOG_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${CATALOG_DB_PASSWORD}
      SUPABASE_JWT_ISSUER: ${SUPABASE_JWT_ISSUER}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    networks:
      - axiserp-network

  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    restart: unless-stopped
    ports:
      - "8087:8087"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: ${INVENTORY_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${INVENTORY_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${INVENTORY_DB_PASSWORD}
      SUPABASE_JWT_ISSUER: ${SUPABASE_JWT_ISSUER}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    networks:
      - axiserp-network

  sales-service:
    build: ./sales-service
    container_name: sales-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: ${SALES_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${SALES_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${SALES_DB_PASSWORD}
      SUPABASE_JWT_ISSUER: ${SUPABASE_JWT_ISSUER}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    networks:
      - axiserp-network

  purchase-service:
    build: ./purchase-service
    container_name: purchase-service
    restart: unless-stopped
    ports:
      - "8086:8086"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: ${PURCHASE_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${PURCHASE_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${PURCHASE_DB_PASSWORD}
      SUPABASE_JWT_ISSUER: ${SUPABASE_JWT_ISSUER}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    networks:
      - axiserp-network

  report-service:
    build: ./report-service
    container_name: report-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: ${REPORT_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${REPORT_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${REPORT_DB_PASSWORD}
      SUPABASE_JWT_ISSUER: ${SUPABASE_JWT_ISSUER}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    networks:
      - axiserp-network

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - catalog-service
      - inventory-service
      - sales-service
      - purchase-service
      - report-service
    networks:
      - axiserp-network

networks:
  axiserp-network:
