services:

  auth-service:
    build: ./auth-service
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - auth-db-url=${auth-db-url}
      - auth-db-username=${auth-db-username}
      - auth-db-password=${auth-db-password}
      - supabase-url=${supabase-url}
      - supabase-jwt-issuer=${supabase-jwt-issuer}
      - supabase-service-role-key=${supabase-service-role-key}
      - supabase-anon-key=${supabase-anon-key}
      - jpa-ddl-auto=validate
      - jwt-secret=${jwt-secret}
      - jwt-access-expiration=${jwt-access-expiration:-900000}
      - jwt-refresh-expiration=${jwt-refresh-expiration:-604800000}
      - internal-api-key=${internal-api-key}
      - server-port=8081
    networks:
      - axiserp-network

  catalog-service:
    build: ./catalog-service
    container_name: catalog-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      - catalog-db-url=${catalog-db-url}
      - catalog-db-username=${catalog-db-username}
      - catalog-db-password=${catalog-db-password}
      - jpa-ddl-auto=validate
      - supabase-jwt-issuer=${supabase-jwt-issuer}
      - internal-api-key=${internal-api-key}
      - catalog-service-url=http://catalog-service:8082
      - sales-service-url=http://sales-service:8084
      - server-port=8082
    networks:
      - axiserp-network

  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      - inventory-db-url=${inventory-db-url}
      - inventory-db-username=${inventory-db-username}
      - inventory-db-password=${inventory-db-password}
      - jpa-ddl-auto=${jpa-ddl-auto:-validate}
      - catalog-service-url=http://catalog-service:8082
      - supabase-jwt-issuer=${supabase-jwt-issuer}
      - internal-api-key=${internal-api-key}
      - server-port=8083
    depends_on:
      - catalog-service
    networks:
      - axiserp-network

  purchase-service:
    build: ./purchase-service
    container_name: purchase-service
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - purchase-db-url=${purchase-db-url}
      - purchase-db-username=${purchase-db-username}
      - purchase-db-password=${purchase-db-password}
      - jpa-ddl-auto=${jpa-ddl-auto:-validate}
      - inventory-service-url=http://inventory-service:8083
      - catalog-service-url=http://catalog-service:8082
      - supabase-jwt-issuer=${supabase-jwt-issuer}
      - internal-api-key=${internal-api-key}
      - server-port=8086
    networks:
      - axiserp-network

  sales-service:
    build: ./sales-service
    container_name: sales-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      - sales-db-url=${sales-db-url}
      - sales-db-username=${sales-db-username}
      - sales-db-password=${sales-db-password}
      - jpa-ddl-auto=validate
      - supabase-jwt-issuer=${supabase-jwt-issuer}
      - catalog-service-url=http://catalog-service:8082
      - inventory-service-url=http://inventory-service:8083
      - internal-api-key=${internal-api-key}
      - server-port=8084
    depends_on:
      - catalog-service
      - inventory-service
    networks:
      - axiserp-network

  report-service:
    build: ./report-service
    container_name: report-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      - report-db-url=${report-db-url}
      - report-db-username=${report-db-username}
      - report-db-password=${report-db-password}
      - jpa-ddl-auto=${jpa-ddl-auto:-update}
      - catalog-service-url=http://catalog-service:8082
      - sales-service-url=http://sales-service:8084
      - purchase-service-url=http://purchase-service:8086
      - inventory-service-url=http://inventory-service:8083
      - supabase-jwt-issuer=${supabase-jwt-issuer}
      - internal-api-key=${internal-api-key}
      - server-port=8085
    depends_on:
      - sales-service
      - purchase-service
    networks:
      - axiserp-network

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - auth-service-url=http://auth-service:8081
      - catalog-service-url=http://catalog-service:8082
      - inventory-service-url=http://inventory-service:8083
      - sales-service-url=http://sales-service:8084
      - purchase-service-url=http://purchase-service:8086
      - report-service-url=http://report-service:8085
      - cors-allowed-origins=${cors-allowed-origins:-http://localhost:3000,http://localhost:5173}
      - server-port=8080
    depends_on:
      - auth-service
      - catalog-service
      - inventory-service
      - purchase-service
      - sales-service
      - report-service
    networks:
      - axiserp-network

networks:
  axiserp-network:
