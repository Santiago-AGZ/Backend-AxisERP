spring.application.name=api-gateway
server.port=8080

# ===================================================
# Spring Cloud Gateway Routes (URLs via env vars)
# Defaults apuntan a nombres de contenedor Docker
# ===================================================

# Auth Service
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${AUTH_SERVICE_URL:http://auth-service:8081}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

# Catalog Service - Categorias
spring.cloud.gateway.routes[1].id=catalog-categorias
spring.cloud.gateway.routes[1].uri=${CATALOG_SERVICE_URL:http://catalog-service:8082}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/categorias/**

# Catalog Service - Productos
spring.cloud.gateway.routes[2].id=catalog-productos
spring.cloud.gateway.routes[2].uri=${CATALOG_SERVICE_URL:http://catalog-service:8082}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/productos/**

# Inventory Service
spring.cloud.gateway.routes[3].id=inventory-service
spring.cloud.gateway.routes[3].uri=${INVENTORY_SERVICE_URL:http://inventory-service:8087}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/inventory/**

# Purchase Service - Suppliers
spring.cloud.gateway.routes[4].id=purchase-suppliers
spring.cloud.gateway.routes[4].uri=${PURCHASE_SERVICE_URL:http://purchase-service:8086}
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/suppliers/**

# Purchase Service - Purchases
spring.cloud.gateway.routes[5].id=purchase-purchases
spring.cloud.gateway.routes[5].uri=${PURCHASE_SERVICE_URL:http://purchase-service:8086}
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/purchases/**

# Sales Service - Customers
spring.cloud.gateway.routes[6].id=sales-customers
spring.cloud.gateway.routes[6].uri=${SALES_SERVICE_URL:http://sales-service:8084}
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/v1/customers/**

# Sales Service - Sales
spring.cloud.gateway.routes[7].id=sales-sales
spring.cloud.gateway.routes[7].uri=${SALES_SERVICE_URL:http://sales-service:8084}
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/v1/sales/**

# Sales Service - Invoices
spring.cloud.gateway.routes[8].id=sales-invoices
spring.cloud.gateway.routes[8].uri=${SALES_SERVICE_URL:http://sales-service:8084}
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/v1/invoices/**

# Report Service
spring.cloud.gateway.routes[9].id=report-service
spring.cloud.gateway.routes[9].uri=${REPORT_SERVICE_URL:http://report-service:8085}
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/v1/reports/**

# Auth Service - Usuarios
spring.cloud.gateway.routes[10].id=auth-usuarios
spring.cloud.gateway.routes[10].uri=${AUTH_SERVICE_URL:http://auth-service:8081}
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/v1/usuarios/**

# Auth Service - Audit Log
spring.cloud.gateway.routes[11].id=auth-audit-log
spring.cloud.gateway.routes[11].uri=${AUTH_SERVICE_URL:http://auth-service:8081}
spring.cloud.gateway.routes[11].predicates[0]=Path=/api/v1/audit-log/**

# ===================================================
# Actuator
# ===================================================
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always
